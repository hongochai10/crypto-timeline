name: Update Visual Regression Baselines

on:
  workflow_dispatch:
    inputs:
      browser:
        description: "Browser to update (or 'all')"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - chromium
          - firefox
          - webkit

concurrency:
  group: update-baselines-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-baselines:
    name: Generate baselines (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        exclude:
          - browser: ${{ github.event.inputs.browser != 'all' && github.event.inputs.browser != 'chromium' && 'chromium' || 'NONE' }}
          - browser: ${{ github.event.inputs.browser != 'all' && github.event.inputs.browser != 'firefox' && 'firefox' || 'NONE' }}
          - browser: ${{ github.event.inputs.browser != 'all' && github.event.inputs.browser != 'webkit' && 'webkit' || 'NONE' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Build
        run: npm run build

      - name: Update snapshots
        run: npx playwright test --project=${{ matrix.browser }} src/e2e/visual-regression.spec.ts --update-snapshots
        env:
          CI_USE_BUILD: true

      - name: Upload baselines as artifact
        uses: actions/upload-artifact@v4
        with:
          name: baselines-${{ matrix.browser }}
          path: src/e2e/visual-regression.spec.ts-snapshots/
          retention-days: 7

  commit-baselines:
    name: Commit updated baselines
    runs-on: ubuntu-latest
    needs: update-baselines
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Download all baseline artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: baselines-*
          path: src/e2e/visual-regression.spec.ts-snapshots/
          merge-multiple: true

      - name: Commit and push baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/e2e/visual-regression.spec.ts-snapshots/
          if git diff --staged --quiet; then
            echo "No baseline changes to commit."
          else
            git commit -m "chore: update visual regression baselines for cross-browser

          Generated on ubuntu-latest for CI consistency.

          Co-Authored-By: Paperclip <noreply@paperclip.ing>"
            git push
          fi
